<!doctype html>
<html lang="es">
  <head>
    <script>
      (() => {
        try {
          const preference = localStorage.getItem("semillas-pref-tema") || "sistema";
          const dark = preference === "oscuro" ||
            (preference === "sistema" && matchMedia("(prefers-color-scheme: dark)").matches);
          const root = document.documentElement;
          root.classList.toggle("dark", dark);
          root.dataset.theme = dark ? "oscuro" : "claro";
          root.dataset.themePreference = preference;
          root.style.colorScheme = dark ? "dark" : "light";
        } catch {
          // La aplicación volverá a aplicar el tema al montar React.
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2E9E5B" />
    <meta name="description" content="Semillas - Aprende de Dios de forma divertida" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <title>Semillas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
