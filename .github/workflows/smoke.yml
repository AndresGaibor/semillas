name: Smoke remoto

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Entorno remoto a verificar
        required: true
        type: choice
        options: [staging, production]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Ejecutar smoke sin exponer secretos
        run: |
          if [ "${{ inputs.environment }}" = "staging" ]; then
            bun run smoke:staging
          else
            bun run smoke:production
          fi
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
          STAGING_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL }}
          PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}
          PRODUCTION_FRONTEND_URL: ${{ vars.PRODUCTION_FRONTEND_URL }}
