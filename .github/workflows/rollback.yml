name: Rollback Semillas staging

on:
  workflow_dispatch:
    inputs:
      worker_version_id:
        description: "Version ID del Worker staging que se debe restaurar"
        required: true
        type: string
      artifact_run_id:
        description: "ID de la ejecución que contiene el frontend aprobado"
        required: true
        type: string
      artifact_commit_sha:
        description: "SHA usado en el nombre del artifact de frontend"
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  rollback-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Instalar dependencias reproducibles
        run: bun install --frozen-lockfile

      - name: Descargar artifact frontend aprobado
        uses: actions/download-artifact@v4
        with:
          name: semillas-frontend-${{ inputs.artifact_commit_sha }}
          path: frontend/dist/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.artifact_run_id }}

      - name: Verificar artifact antes de revertir
        run: |
          test -s frontend/dist/index.html
          test -s frontend/dist/sw.js
          bun run performance:bundle
          bun run pwa:check

      - name: Revertir Worker staging
        run: bunx wrangler rollback "${{ inputs.worker_version_id }}" --env staging --message "Rollback controlado G8"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Revertir frontend staging
        run: bun run deploy:frontend:artifact:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PAGES_PROJECT_NAME: ${{ vars.CF_PAGES_PROJECT_NAME }}

      - name: Smoke posterior al rollback
        run: bun run smoke:staging
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
          STAGING_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL }}
