name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck backend
        run: bun run --cwd backend typecheck

      - name: Build backend
        run: bun run --cwd backend build

      - name: Typecheck frontend
        run: bun run --cwd frontend typecheck

      - name: Build frontend
        run: bun run --cwd frontend build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Validate frontend budgets and PWA artifact
        run: |
          bun run performance:bundle
          bun run pwa:check

      - name: Validate i18n
        run: bun run i18n:check

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run all unit and contract tests
        run: bun run test

      - name: Run smoke contract tests
        run: bun test scripts/smoke.test.ts

      - name: Capture coverage artifact
        run: bun run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: |
            backend/coverage/
            frontend/coverage/
          if-no-files-found: warn
          retention-days: 14

      - name: Run backend and PWA end-to-end tests
        run: bun run test:e2e
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  traceability:
    name: Traceability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate requirements matrix
        run: bun run test:trazabilidad

      - name: Validate configuration secrets
        run: bun run test:seguridad

      - name: Validate documentation links
        run: |
          bun run docs:check
          bun run docs:freshness

      - name: Validate traceability paths and evidence
        run: bun run trazabilidad:check
