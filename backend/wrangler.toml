name = "api-semillas"
main = "src/index.ts"
compatibility_date = "2026-07-09"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

# Las rutas custom domain se configuran desde el dashboard (Workers → Triggers)
# routes = [
#   { pattern = "api.semillas.org", custom_domain = true }
# ]

[env.production]
vars = { APP_ENV = "production", CORS_ORIGIN = "https://semillas.org" }

[env.staging]
vars = { APP_ENV = "staging", CORS_ORIGIN = "https://staging.semillas.pages.dev" }

[env.preview]
vars = { APP_ENV = "preview", CORS_ORIGIN = "https://{branch}.semillas.pages.dev" }

# Secrets se configuran desde el dashboard (Workers → Settings → Variables)
# SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY
